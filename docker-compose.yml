services:

  # ── Base de datos MySQL 8 ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: bas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dwf_fase1
    ports:
      - "3307:3306"   # 3307 en host para no chocar con MySQL local
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/Database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Aplicación web (Tomcat 9 + WAR) ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bas-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dwf_fase1
      DB_USER: root
      DB_PASS: root
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
