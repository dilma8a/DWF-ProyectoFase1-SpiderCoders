<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Login</title>
</h:head>
<h:body>
    <h1>Inicio de sesion</h1>

    <h:panelGroup rendered="#{not empty param.error}">
        <p style="color: red;">Usuario o clave incorrectos.</p>
    </h:panelGroup>
    <h:panelGroup rendered="#{not empty param.logout}">
        <p style="color: green;">Sesion finalizada correctamente.</p>
    </h:panelGroup>

    <form method="post" action="#{request.contextPath}/login">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" required="required"/>
        <br/>
        <label for="password">Clave</label>
        <input id="password" name="password" type="password" required="required"/>
        <br/>
        <button type="submit">Ingresar</button>
    </form>

    <h3>Usuarios de prueba</h3>
    <ul>
        <li>gerente / gerente123</li>
        <li>cajero / cajero123</li>
        <li>cliente / cliente123</li>
    </ul>
</h:body>
</html>
