<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                template="/templates/gerente-general-layout-v2.xhtml">
    <ui:define name="pageTitle">Nueva sucursal</ui:define>
    <ui:define name="content">
        <h1 class="page-title">Crear nueva sucursal</h1>
        <p class="page-subtitle">Registra una sucursal y asigna un gerente disponible sin salir del flujo JSF.</p>

        <h:messages globalOnly="true" layout="list" styleClass="messages" />

        <div class="split-grid">
            <section class="panel">
                <div class="panel-header">Datos de la sucursal</div>
                <div class="panel-body">
                    <h:form id="sucursalForm" prependId="false">
                        <div class="form-grid">
                            <div class="form-field full">
                                <label for="nombre">Nombre</label>
                                <h:inputText id="nombre" value="#{sucursalBean.sucursal.nombre}" styleClass="input" required="true" requiredMessage="Ingrese el nombre de la sucursal" pt:placeholder="Sucursal centro, oriente, etc." />
                            </div>
                            <div class="form-field full">
                                <label for="direccion">Direccion</label>
                                <h:inputText id="direccion" value="#{sucursalBean.sucursal.direccion}" styleClass="input" required="true" requiredMessage="Ingrese la direccion" pt:placeholder="Direccion completa" />
                            </div>
                            <div class="form-field">
                                <label for="telefono">Telefono</label>
                                <h:inputText id="telefono" value="#{sucursalBean.sucursal.telefono}" styleClass="input" pt:placeholder="2222-3333" />
                            </div>
                            <div class="form-field">
                                <label>Estado</label>
                                <div class="radio-row">
                                    <h:selectOneRadio value="#{sucursalBean.sucursal.estado}">
                                        <f:selectItem itemLabel="Activa" itemValue="1" />
                                        <f:selectItem itemLabel="Inactiva" itemValue="0" />
                                    </h:selectOneRadio>
                                </div>
                            </div>
                            <div class="form-field full">
                                <label for="gerente">Gerente de sucursal</label>
                                <h:selectOneMenu id="gerente" value="#{sucursalBean.idGerenteSeleccionado}" styleClass="select">
                                    <f:selectItem itemLabel="Sin asignar" itemValue="#{null}" />
                                    <f:selectItems value="#{sucursalBean.gerentesDisponibles}" var="gerente" itemValue="#{gerente.idEmpleado}" itemLabel="#{gerente.nombreCompleto} - #{gerente.sucursal.nombre}" />
                                </h:selectOneMenu>
                            </div>
                        </div>
                        <div class="toolbar" style="margin-top: 18px;">
                            <h:commandButton value="Guardar sucursal" action="#{sucursalBean.guardar}" styleClass="btn btn-primary" />
                            <h:commandButton value="Limpiar" action="#{sucursalBean.limpiarFormulario}" immediate="true" styleClass="btn btn-secondary" />
                        </div>
                    </h:form>
                </div>
            </section>

            <section class="data-card">
                <div class="data-card-header">Sucursales registradas</div>
                <div class="data-card-body">
                    <div class="table-wrap">
                        <h:dataTable value="#{sucursalBean.sucursales}" var="sucursal" styleClass="bank-table">
                            <h:column><f:facet name="header">Nombre</f:facet><h:outputText value="#{sucursal.nombre}" /></h:column>
                            <h:column><f:facet name="header">Direccion</f:facet><h:outputText value="#{sucursal.direccion}" /></h:column>
                            <h:column><f:facet name="header">Telefono</f:facet><h:outputText value="#{sucursal.telefono}" /></h:column>
                            <h:column><f:facet name="header">Estado</f:facet><span class="badge #{sucursal.estado == 1 ? 'badge-success' : 'badge-danger'}"><h:outputText value="#{sucursal.estado == 1 ? 'Activa' : 'Inactiva'}" /></span></h:column>
                        </h:dataTable>
                    </div>
                    <h:panelGroup rendered="#{empty sucursalBean.sucursales}" layout="block" styleClass="empty-state">Todavia no existen sucursales registradas.</h:panelGroup>
                </div>
            </section>
        </div>
    </ui:define>
</ui:composition>
