<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
                template="/templates/gerente-general-layout-v2.xhtml">
    <ui:define name="pageTitle">Movimientos recientes</ui:define>
    <ui:define name="content">
        <h1 class="page-title">Movimientos recientes</h1>
        <p class="page-subtitle">Filtra por sucursal, tipo de movimiento y fechas para revisar la operacion general.</p>

        <h:messages globalOnly="true" layout="list" styleClass="messages" />

        <section class="panel" style="margin-bottom: 18px;">
            <div class="panel-header">Filtros</div>
            <div class="panel-body">
                <h:form id="filtroForm" prependId="false">
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="sucursal">Sucursal</label>
                            <h:selectOneMenu id="sucursal" value="#{movimientoBean.idSucursalFiltro}" styleClass="select">
                                <f:selectItem itemLabel="Todas" itemValue="#{null}" noSelectionOption="true" />
                                <f:selectItems value="#{movimientoBean.sucursales}" var="sucursal" itemValue="#{sucursal.idSucursal}" itemLabel="#{sucursal.nombre}" />
                            </h:selectOneMenu>
                        </div>
                        <div class="form-field">
                            <label for="tipoMovimiento">Tipo de movimiento</label>
                            <h:selectOneMenu id="tipoMovimiento" value="#{movimientoBean.tipoMovimientoFiltro}" styleClass="select">
                                <f:selectItem itemLabel="Todos" itemValue="" />
                                <f:selectItems value="#{movimientoBean.tiposMovimiento}" var="tipo" itemValue="#{tipo}" itemLabel="#{tipo}" />
                            </h:selectOneMenu>
                        </div>
                        <div class="form-field">
                            <label for="fechaDesde">Fecha desde</label>
                            <h:inputText id="fechaDesde" value="#{movimientoBean.fechaDesde}" styleClass="input" pt:type="date" />
                        </div>
                        <div class="form-field">
                            <label for="fechaHasta">Fecha hasta</label>
                            <h:inputText id="fechaHasta" value="#{movimientoBean.fechaHasta}" styleClass="input" pt:type="date" />
                        </div>
                    </div>
                    <div class="toolbar" style="margin-top: 18px;">
                        <h:commandButton value="Buscar" action="#{movimientoBean.filtrar}" styleClass="btn btn-primary" />
                        <h:commandButton value="Limpiar" action="#{movimientoBean.limpiarFiltros}" immediate="true" styleClass="btn btn-secondary" />
                    </div>
                </h:form>
            </div>
        </section>

        <section class="data-card">
            <div class="data-card-header">Listado de movimientos</div>
            <div class="data-card-body">
                <div class="table-wrap">
                    <h:dataTable value="#{movimientoBean.movimientos}" var="movimiento" styleClass="bank-table">
                        <h:column><f:facet name="header">Cuenta</f:facet><h:outputText value="#{movimiento.cuenta.numeroCuenta}" /></h:column>
                        <h:column><f:facet name="header">Cliente</f:facet><h:outputText value="#{movimiento.cuenta.cliente.nombres} #{movimiento.cuenta.cliente.apellidos}" /></h:column>
                        <h:column><f:facet name="header">Sucursal</f:facet><h:outputText value="#{movimiento.cuenta.sucursal.nombre}" /></h:column>
                        <h:column><f:facet name="header">Tipo</f:facet><span class="badge #{movimiento.tipoMovimiento eq 'Retiro' ? 'badge-danger' : movimiento.tipoMovimiento eq 'Deposito' ? 'badge-success' : 'badge-neutral'}"><h:outputText value="#{movimiento.tipoMovimiento}" /></span></h:column>
                        <h:column><f:facet name="header">Monto</f:facet><h:outputText value="#{movimiento.monto}"><f:convertNumber pattern="$#,##0.00" /></h:outputText></h:column>
                        <h:column><f:facet name="header">Saldo anterior</f:facet><h:outputText value="#{movimiento.saldoAnterior}"><f:convertNumber pattern="$#,##0.00" /></h:outputText></h:column>
                        <h:column><f:facet name="header">Saldo resultante</f:facet><h:outputText value="#{movimiento.saldoResultante}"><f:convertNumber pattern="$#,##0.00" /></h:outputText></h:column>
                        <h:column><f:facet name="header">Fecha</f:facet><h:outputText value="#{movimiento.fechaMovimientoTexto}" /></h:column>
                    </h:dataTable>
                </div>
                <h:panelGroup rendered="#{empty movimientoBean.movimientos}" layout="block" styleClass="empty-state">No hay movimientos para los filtros seleccionados.</h:panelGroup>
            </div>
        </section>
    </ui:define>
</ui:composition>
